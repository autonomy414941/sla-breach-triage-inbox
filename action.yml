name: GitHub SLA Policy Guard Command
description: GitHub Action for recurring SLA policy triage from GitHub Issues or Zendesk CSV imports.
author: autonomy414941
branding:
  icon: alert-triangle
  color: red
inputs:
  ingestion_mode:
    description: Data source mode. Use github_issues (default) for repo issue ingestion or zendesk_csv for legacy CSV imports.
    required: false
    default: github_issues
  github_issues_json_path:
    description: Optional path to a JSON file with GitHub issue payload (array or search.items format).
    required: false
  use_sample_github_issues:
    description: Use bundled sample GitHub issues when API fetch/file input is unavailable.
    required: false
    default: "true"
  github_token:
    description: Optional GitHub token for API issue fetch. Defaults to GITHUB_TOKEN env when available.
    required: false
  zendesk_csv_path:
    description: Path to a Zendesk CSV export file (used when ingestion_mode=zendesk_csv).
    required: false
  use_sample_csv:
    description: Use bundled sample CSV when ingestion_mode=zendesk_csv and zendesk_csv_path is missing.
    required: false
    default: "false"
  api_base_url:
    description: Base URL of the hosted SLA Breach Triage Inbox API.
    required: false
    default: https://sla-breach-triage.devtoolbox.dedyn.io
  team_name:
    description: Team label passed to the workspace profile.
    required: false
    default: Support Ops Team
  helpdesk_platform:
    description: Helpdesk platform name (default depends on ingestion_mode).
    required: false
    default: GitHub Issues
  primary_queue:
    description: Queue name used for triage context.
    required: false
    default: repo-issues
  sla_target_minutes:
    description: SLA target in minutes.
    required: false
    default: "45"
  monthly_ticket_volume:
    description: Monthly ticket volume estimate.
    required: false
    default: "4200"
  breach_rate_percent:
    description: Breach rate percentage estimate.
    required: false
    default: "8.5"
  timezone:
    description: Timezone used for scheduling context.
    required: false
    default: UTC
  escalation_coverage:
    description: Escalation coverage model.
    required: false
    default: 24/7 follow-the-sun with duty-manager escalation
  high_value_definition:
    description: Definition of high-value customers.
    required: false
    default: Enterprise and contract-backed SLA accounts
  max_tickets:
    description: Number of tickets to include (1-8).
    required: false
    default: "4"
  workspace_key:
    description: Stable workspace key used to auto-resume recurring team sessions.
    required: false
  source:
    description: Event source label for attribution.
    required: false
    default: github_action
  self_test:
    description: Mark this run as self-test telemetry.
    required: false
    default: "false"
  fail_on_p0:
    description: Fail the job if any recommended ticket is P0.
    required: false
    default: "true"
  output_markdown_path:
    description: Optional file path to save a markdown report artifact.
    required: false
outputs:
  highest_priority:
    description: Highest recommended priority in this run (P0-P3 or none).
  escalation_count:
    description: Number of tickets flagged for immediate escalation.
  recommended_ticket_id:
    description: Top recommended ticket id.
  recommended_owner:
    description: Suggested owner for the top ticket.
  csv_source:
    description: Legacy CSV source output (workspace_file, bundled_sample, or not_used).
  ingestion_mode:
    description: Effective ingestion mode used for this run.
  input_source:
    description: Source of input data used in this run (github_api, workspace_file, or bundled_sample).
  session_id:
    description: Workspace session id created or resumed for this run.
  workspace_key:
    description: Stable workspace key used for session resume.
runs:
  using: node20
  main: distribution/github-action/index.js
